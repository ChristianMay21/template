schemaVersion: 1
kind: agent
name: pi
agent:
  image: docker/sandbox-templates:shell-docker
  aiFilename: AGENTS.md
  persistence: persistent
  entrypoint:
    run: [pi]

network:
  allowedDomains:
    - pi.dev

environment:
  variables:
    IS_SANDBOX: "1"
    PI_CODING_AGENT_DIR: "~"

commands:
  install:
    - command: npm install -g --ignore-scripts @earendil-works/pi-coding-agent
      user: 1000
      description: Install Pi
